# Render Blueprint Specification
# Deploy Memoir to Render — Family Memory Vault
# https://render.com

databases:
  - name: memoir-db
    databaseName: memoir
    user: memoir
    plan: free
    region: oregon
    ipAllowList: []

services:
  - type: web
    name: memoir-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && (pip install -r requirements-ai.txt || echo "Optional search deps unavailable, using keyword fallback") && mkdir -p uploads
    startCommand: uvicorn backend.routes.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: memoir-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: CORS_ORIGINS
        value: "http://localhost:5173, https://memoir-frontend.onrender.com"
      - key: UPLOAD_DIR
        value: ./uploads


  - type: web
    name: memoir-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://memoir-api.onrender.com
