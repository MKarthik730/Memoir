# Render Blueprint Specification
# Deploy Memoir to Render — Family Memory Vault
# https://render.com

services:
  - type: web
    name: memoir-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build && cd .. && mkdir -p uploads
    startCommand: uvicorn backend.routes.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: CORS_ORIGINS
        value: "http://localhost:5173, https://memoir-frontend.onrender.com"
      - key: UPLOAD_DIR
        value: ./uploads
      - key: VITE_API_URL
        value: ""

  - type: web
    name: memoir-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://memoir-api.onrender.com
