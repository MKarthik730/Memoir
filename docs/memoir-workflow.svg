<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Memoir Workflow</title>
  <desc>End-to-end workflow for the Memoir app</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="620" fill="#ffffff"/>

  <!-- USER -->
  <rect x="240" y="30" width="200" height="48" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text x="340" y="51" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">User</text>
  <text x="340" y="69" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">Sign up / Login (JWT)</text>

  <line x1="340" y1="78" x2="340" y2="108" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DASHBOARD -->
  <rect x="215" y="108" width="250" height="48" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1"/>
  <text x="340" y="129" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#26215C">Dashboard</text>
  <text x="340" y="147" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">Categories &amp; people overview</text>

  <line x1="265" y1="156" x2="130" y2="226" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="156" x2="340" y2="226" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="415" y1="156" x2="550" y2="226" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PEOPLE -->
  <rect x="30" y="226" width="190" height="56" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="125" y="247" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#04342C">People</text>
  <text x="125" y="265" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">Add, view by category</text>

  <!-- MEMORY ENTRY -->
  <rect x="225" y="226" width="230" height="56" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="340" y="247" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#04342C">Memory Entry</text>
  <text x="340" y="265" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">Text + photo per person</text>

  <!-- FILE UPLOAD -->
  <rect x="460" y="226" width="190" height="56" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="555" y="247" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#04342C">File Upload</text>
  <text x="555" y="265" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">Photos stored in DB</text>

  <line x1="125" y1="282" x2="255" y2="352" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="282" x2="340" y2="352" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="555" y1="282" x2="425" y2="352" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- POSTGRESQL -->
  <rect x="200" y="352" width="280" height="48" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
  <text x="340" y="373" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">PostgreSQL</text>
  <text x="340" y="391" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">SQLAlchemy ORM · persistent store</text>

  <line x1="280" y1="400" x2="160" y2="460" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="400" x2="520" y2="460" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AI SEARCH -->
  <rect x="40" y="460" width="220" height="56" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="1"/>
  <text x="150" y="481" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#4A1B0C">AI Search (RAG)</text>
  <text x="150" y="499" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">Embeddings · vector query</text>

  <!-- RELATIONSHIP GRAPH -->
  <rect x="420" y="460" width="220" height="56" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="1"/>
  <text x="530" y="481" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#4A1B0C">Relationship Graph</text>
  <text x="530" y="499" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">Force-directed · interactive</text>

  <line x1="150" y1="516" x2="270" y2="556" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="516" x2="410" y2="556" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PDF EXPORT -->
  <rect x="215" y="556" width="250" height="48" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
  <text x="340" y="577" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#412402">PDF Export</text>
  <text x="340" y="595" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#854F0B">Per-person memoir download</text>

</svg>
