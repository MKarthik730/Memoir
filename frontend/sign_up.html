<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Memoir — Sign up</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
</head>
<body class="page-auth">
  <div class="gradient-bg"></div>
  <main class="auth-container">
    <div class="brand">
      <img src="/logo.svg" alt="Memoir Logo" style="width: 64px; height: 64px;">
      <h1>Create account</h1>
      <p class="muted">Join Memoir — preserve your precious memories</p>
    </div>

    <form id="signupForm" class="card card--elevated">
      <div class="input-group">
        <label class="input-label">Username</label>
        <input id="signupName" name="name" type="text" class="input-field" placeholder="Choose a username" required minlength="3" />
      </div>
      <div class="input-group">
        <label class="input-label">Password</label>
        <input id="signupPassword" name="password" type="password" class="input-field" placeholder="Create a password (min 8 chars)" required minlength="8" />
      </div>
      <button class="btn btn-primary w-full" type="submit">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
      <div class="text-center" style="margin-top: 16px;">
        <a class="link" href="index.html">
          <i class="fas fa-arrow-left"></i> Back to login
        </a>
      </div>
    </form>
  </main>
  <div id="toastContainer"></div>
  <script src="/app.js"></script>
  <script>
    const API_BASE = '';
    
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('signupName').value.trim();
      const password = document.getElementById('signupPassword').value;
      const btn = e.target.querySelector('button[type="submit"]');
      
      if (!name || !password) {
        showToast('Please fill in all fields', 'warning');
        return;
      }
      
      if (password.length < 8) {
        showToast('Password must be at least 8 characters', 'warning');
        return;
      }
      
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
      
      try {
        const response = await fetch(API_BASE + '/sign_up', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.detail || 'Registration failed');
        }
        
        localStorage.setItem('memoir_token', data.access_token);
        localStorage.setItem('memoir_user', data.username);
        localStorage.setItem('memoir_user_id', data.user_id);
        
        showToast('Account created! Welcome!', 'success');
        
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 500);
      } catch (error) {
        showToast(error.message || 'Registration failed', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
      }
    });
  </script>
</body>
</html>
