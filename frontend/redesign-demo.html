<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memoir — UI Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f8f8;
  --surface: #ffffff;
  --border: #e8e8e8;
  --text: #1a1a1a;
  --text-secondary: #6b6b6b;
  --text-muted: #9a9a9a;
  --accent: #7C6A5E;
  --accent-hover: #6B5A4F;
  --accent-light: rgba(124, 106, 94, 0.08);
  --accent-lighter: rgba(124, 106, 94, 0.04);
  --danger: #d32f2f;
  --sidebar-width: 240px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 12px;
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  overflow-x: hidden;
}
::selection { background: rgba(124, 106, 94, 0.2); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

/* Layout */
.app-layout { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-width);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 100;
}
.sidebar-header {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--text);
  text-decoration: none;
  display: flex; align-items: center; gap: 10px;
}
.sidebar-logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-family: var(--font-display);
  font-size: 16px;
  font-style: italic;
}
.sidebar-nav { flex: 1; padding: 12px 10px; }
.sidebar-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 14px; font-weight: 450;
  cursor: pointer; transition: all 0.15s;
  text-decoration: none;
  margin-bottom: 2px;
}
.sidebar-nav-item:hover { background: var(--accent-lighter); color: var(--text); }
.sidebar-nav-item.active {
  background: var(--accent-light);
  color: var(--accent);
  font-weight: 500;
}
.sidebar-nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }
.sidebar-nav-item.active svg { opacity: 1; }
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}
.sidebar-member-avatars {
  display: flex; gap: 6px; align-items: center;
  margin-bottom: 8px;
}
.sidebar-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600; color: white;
  border: 2px solid var(--surface);
}
.sidebar-avatar-more {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--text-muted);
  border: 2px solid var(--surface);
}
.sidebar-member-label {
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.5px;
  font-weight: 500;
}

/* Main content */
.main-content {
  flex: 1;
  margin-left: var(--sidebar-width);
  min-height: 100vh;
}

/* Auth pages */
.auth-page {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  margin-left: 0;
}
.auth-container {
  width: 100%; max-width: 400px;
  padding: 40px;
}
.auth-logo {
  text-align: center; margin-bottom: 32px;
}
.auth-logo-icon {
  width: 48px; height: 48px;
  background: var(--accent);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  color: white;
  font-family: var(--font-display);
  font-size: 24px;
  font-style: italic;
}
.auth-logo h1 {
  font-family: var(--font-display);
  font-size: 28px;
  color: var(--text);
  font-weight: 400;
}
.auth-logo p {
  font-size: 14px;
  color: var(--text-muted);
  margin-top: 4px;
}
.auth-tabs {
  display: flex;
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 3px;
  margin-bottom: 24px;
}
.auth-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  border: none; background: transparent;
  border-radius: 4px;
  font-family: var(--font-body);
  font-size: 13px; font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.auth-tab.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 12px; font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.form-input {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text);
  background: var(--surface);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124, 106, 94, 0.1);
}
.form-input::placeholder { color: #bbb; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px 20px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
  text-decoration: none;
}
.btn:active { transform: scale(0.98); }
.btn-primary {
  background: var(--accent);
  color: white;
  width: 100%;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-outline {
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
}
.btn-outline:hover { background: var(--accent-light); }
.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  padding: 8px 12px;
}
.btn-ghost:hover { background: var(--accent-lighter); color: var(--text); }
.btn-sm { padding: 8px 14px; font-size: 13px; }
.auth-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--text-muted);
}
.auth-footer a {
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
}
.auth-footer a:hover { text-decoration: underline; }
.auth-error {
  padding: 10px 14px;
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: var(--radius-sm);
  color: var(--danger);
  font-size: 13px;
  margin-bottom: 16px;
}

/* Page header */
.page-header {
  padding: 28px 32px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.page-header-left {}
.page-header-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 400;
  color: var(--text);
}
.page-header-subtitle {
  font-size: 14px;
  color: var(--text-muted);
  margin-top: 2px;
}
.page-header-actions {
  display: flex; align-items: center; gap: 8px;
}
.icon-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
  color: var(--text-secondary);
}
.icon-btn:hover { background: var(--bg); color: var(--text); }
.icon-btn svg { width: 18px; height: 18px; }

/* Cards grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  padding: 24px 32px;
}
.member-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
}
.member-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.member-card-top {
  display: flex; align-items: flex-start; gap: 14px;
  margin-bottom: 12px;
}
.member-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 20px; color: white;
  flex-shrink: 0;
}
.member-info { flex: 1; min-width: 0; }
.member-name {
  font-size: 16px; font-weight: 600;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.member-role-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px; font-weight: 500;
  margin-top: 4px;
  background: var(--accent-light);
  color: var(--accent);
}
.member-memory-count {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 8px;
  display: flex; align-items: center; gap: 4px;
}
.member-bio {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Profile Header */
.profile-header {
  position: relative;
  height: 240px;
  overflow: hidden;
  background: linear-gradient(135deg, #e8e0da 0%, #d4c9c0 100%);
}
.profile-header-content {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 32px;
  background: linear-gradient(transparent, rgba(0,0,0,0.15));
  display: flex; align-items: flex-end; justify-content: space-between;
}
.profile-header-left { display: flex; align-items: center; gap: 20px; }
.profile-header-avatar {
  width: 72px; height: 72px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 32px; color: white;
  border: 3px solid rgba(255,255,255,0.8);
  flex-shrink: 0;
}
.profile-header-name {
  font-family: var(--font-display);
  font-size: 30px;
  color: white;
  font-weight: 400;
  text-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
.profile-header-role {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px; font-weight: 500;
  background: rgba(255,255,255,0.2);
  color: white;
  backdrop-filter: blur(4px);
  margin-top: 4px;
}
.profile-header-actions {
  display: flex; gap: 8px;
}

/* Memories section */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 32px 0;
}
.section-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 400;
  color: var(--text);
}
.memories-list {
  padding: 20px 32px;
  display: flex; flex-direction: column; gap: 12px;
}
.memory-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px;
  box-shadow: var(--shadow-sm);
}
.memory-title {
  font-size: 16px; font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}
.memory-date {
  font-size: 12px; color: var(--text-muted);
  margin-bottom: 10px;
}
.memory-text {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}
.memory-photos {
  display: flex; gap: 8px;
  margin-top: 12px;
}
.memory-photo-thumb {
  width: 56px; height: 56px;
  border-radius: var(--radius-sm);
  object-fit: cover;
  background: var(--bg);
  border: 1px solid var(--border);
}
.memory-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.memory-contributor {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text-muted);
}
.memory-contributor-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600; color: white;
}
.memory-share-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: #25D366;
  background: rgba(37, 211, 102, 0.08);
  transition: all 0.15s;
}
.memory-share-btn:hover { background: rgba(37, 211, 102, 0.15); }

/* Search page */
.search-page { padding: 32px; }
.search-bar-wrapper {
  max-width: 600px; margin: 0 auto 60px;
}
.search-input-container {
  position: relative;
}
.search-input-icon {
  position: absolute; left: 16px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 16px 16px 16px 48px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 16px;
  color: var(--text);
  background: var(--surface);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  box-shadow: var(--shadow-sm);
}
.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124, 106, 94, 0.1);
}
.search-empty-state {
  text-align: center;
  padding: 80px 20px;
}
.search-empty-icon {
  width: 64px; height: 64px;
  margin: 0 auto 20px;
  color: #d0d0d0;
}
.search-empty-title {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--text);
  margin-bottom: 6px;
  font-weight: 400;
}
.search-empty-subtitle {
  font-size: 14px;
  color: var(--text-muted);
}

/* Graph view */
.graph-page { padding: 0; position: relative; height: calc(100vh - 80px); }
.graph-canvas {
  width: 100%; height: 100%;
  background: var(--surface);
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.graph-controls {
  position: absolute;
  right: 20px; top: 50%;
  transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 6px;
  z-index: 10;
}
.graph-control-btn {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
  color: var(--text-secondary);
}
.graph-control-btn:hover { background: var(--bg); color: var(--text); box-shadow: var(--shadow-md); }
.graph-control-btn svg { width: 18px; height: 18px; }
.graph-add-btn {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--accent);
  color: white;
  box-shadow: var(--shadow-sm);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
  margin-top: 12px;
}
.graph-add-btn:hover { background: var(--accent-hover); box-shadow: var(--shadow-md); }
.graph-add-btn svg { width: 18px; height: 18px; }
.graph-node {
  position: absolute;
  cursor: pointer;
  transition: transform 0.15s;
}
.graph-node:hover { transform: scale(1.1); z-index: 20; }
.graph-node-circle {
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-family: var(--font-display);
  font-size: 18px;
  margin: 0 auto;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  border: 2px solid white;
}
.graph-node-label {
  text-align: center;
  font-size: 11px; font-weight: 500;
  color: var(--text-secondary);
  margin-top: 6px;
  white-space: nowrap;
}
.graph-line {
  position: absolute;
  height: 2px;
  background: #d0c8c0;
  transform-origin: 0 50%;
  z-index: 1;
}
.graph-line-label {
  position: absolute;
  font-size: 10px;
  color: var(--text-muted);
  z-index: 2;
  background: var(--surface);
  padding: 0 4px;
  white-space: nowrap;
}
.graph-empty-state {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.graph-empty-title {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--text);
  margin-bottom: 4px;
  font-weight: 400;
}
.graph-empty-subtitle {
  font-size: 13px;
  color: var(--text-muted);
}

/* Utility */
.flex { display: flex; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.mt-2 { margin-top: 8px; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main-content { margin-left: 0; }
  .page-header { padding: 20px 16px 0; flex-direction: column; align-items: flex-start; gap: 12px; }
  .cards-grid { padding: 16px; grid-template-columns: 1fr; }
  .memories-list { padding: 16px; }
  .section-header { padding: 16px 16px 0; }
  .search-page { padding: 20px 16px; }
  .search-bar-wrapper { margin-bottom: 40px; }
  .profile-header { height: 200px; }
  .profile-header-content { padding: 20px; flex-direction: column; align-items: flex-start; gap: 12px; }
  .profile-header-avatar { width: 56px; height: 56px; font-size: 24px; }
  .profile-header-name { font-size: 24px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ─── SVG Icons ───────────────────────────────────────────────────────────────
const S = (path) => (props) => <svg xmlns="http://www.w3.org/2000/svg" {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{__html: path}} />;

  UserPlus: S('<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>'),

// ─── Sign Up Page ─────────────────────────────────────────────────────────────
function SignUpPage({ onNavigateHome, onSwitchToSignIn }) {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [confirmPassword, setConfirmPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    setError('');
    if (!name || !email || !password) { setError('Please fill in all fields'); return; }
    if (password !== confirmPassword) { setError('Passwords do not match'); return; }
    if (password.length < 8) { setError('Password must be at least 8 characters'); return; }
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      onNavigateHome();
    }, 800);
  };

  return (
    <div className="auth-page">
      <div className="auth-container">
        <div className="auth-logo">
          <div className="auth-logo-icon">M</div>
          <h1>Memoir</h1>
          <p>Your family's story, forever.</p>

          <div className="auth-tab" onClick={onSwitchToSignIn} style={{ cursor: 'pointer' }}>Sign In</div>
          <div className="auth-tab active">Sign Up</div>
        </div>
        {error && <div className="auth-error">{error}</div>}

          <div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" placeholder="Min. 8 characters" value={password} onChange={e => setPassword(e.target.value)} />

          <a href="#" onClick={(e) => { e.preventDefault(); onSwitchToSignIn(); }}>Use your invite link</a>

    </div>
  );

// ─── Graph View ──────────────────────────────────────────────────────────────
function GraphView() {
  const [scale, setScale] = useState(1);
  const canvasRef = useRef(null);
  const [dims, setDims] = useState({ w: 700, h: 460 });

  useEffect(() => {
    const el = canvasRef.current;
    if (!el) return;
    const obs = new ResizeObserver(entries => {
      const rect = entries[0].contentRect;
      setDims({ w: rect.width, h: rect.height });
    });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);

  const centerX = dims.w / 2, centerY = dims.h / 2;
  const radius = Math.min(dims.w, dims.h) * 0.3;

  const nodes = useMemo(() => {
    return MOCK_PEOPLE.map((person, i) => {
      const angle = (i / MOCK_PEOPLE.length) * 2 * Math.PI - Math.PI / 2;
      return {
        ...person,
        x: centerX + radius * Math.cos(angle),
        y: centerY + radius * Math.sin(angle),
      };
    });
  }, [centerX, centerY, radius]);

  const edges = useMemo(() => {
    return MOCK_RELATIONSHIPS.map(rel => {
      const a = nodes.find(n => n.id === rel.a);
      const b = nodes.find(n => n.id === rel.b);
      if (!a || !b) return null;
      return { ...rel, x1: a.x, y1: a.y, x2: b.x, y2: b.y, cx: (a.x + b.x) / 2, cy: (a.y + b.y) / 2, personA: a, personB: b };
    }).filter(Boolean);
  }, [nodes]);

  return (
    <div className="main-content">
      <div className="page-header">
        <div className="page-header-left">
          <div className="page-header-title">Family Graph</div>
          <div className="page-header-subtitle">{MOCK_PEOPLE.length} members, {MOCK_RELATIONSHIPS.length} connections</div>
        </div>
      </div>
      <div className="graph-page" style={{ padding: '24px 32px' }}>
        <div className="graph-canvas" ref={canvasRef} style={{ height: 520, position: 'relative', overflow: 'hidden' }}>
          <div style={{
            position: 'absolute', top: 0, left: 0, width: '100%', height: '100%',
            transform: `scale(${scale})`, transformOrigin: 'center center',
            transition: 'transform 0.2s ease',
          }}>
            {/* SVG lines */}
            <svg style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: 'none' }}>
              {edges.map((edge, i) => (
                <g key={i}>
                  <line x1={edge.x1} y1={edge.y1} x2={edge.x2} y2={edge.y2} stroke="#d0c8c0" strokeWidth="2" strokeOpacity="0.6" />
                  <text x={edge.cx} y={edge.cy - 8} textAnchor="middle" fill="#9a9a9a" fontSize="10" fontFamily="DM Sans, sans-serif">{edge.label}</text>
                </g>
              ))}
            </svg>
            {/* Nodes */}
            {nodes.map(node => (
              <div key={node.id} className="graph-node" style={{ position: 'absolute', left: node.x - 24, top: node.y - 24 }}>
                <div className="graph-node-circle" style={{ background: getColor(node.name) }}>{getInitials(node.name)}</div>
                <div className="graph-node-label">{node.name}</div>
              </div>
            ))}
          </div>

          {MOCK_PEOPLE.length === 0 && (
            <div className="graph-empty-state" style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%,-50%)', textAlign: 'center' }}>
              <div className="graph-empty-title">No family members yet</div>
              <div className="graph-empty-subtitle">Add people and relationships to see your family tree</div>
            </div>
          )}

          <div className="graph-controls">
            <div className="graph-control-btn" onClick={() => setScale(s => Math.min(s + 0.2, 3))}><Icons.ZoomIn /></div>
            <div className="graph-control-btn" onClick={() => setScale(s => Math.max(s - 0.2, 0.3))}><Icons.ZoomOut /></div>
            <div className="graph-control-btn" onClick={() => setScale(1)}><Icons.RotateCcw /></div>
            <div className="graph-add-btn" title="Add Relationship"><Icons.Plus /></div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Main App ────────────────────────────────────────────────────────────────
function App() {
  const [authPage, setAuthPage] = useState('signin'); // 'signin' | 'signup'
  const [isAuthenticated, setIsAuthenticated] = useState(false);
  const [page, setPage] = useState('home');
  const [selectedPersonId, setSelectedPersonId] = useState(null);

  const handleLogin = () => setIsAuthenticated(true);

  const handleLogout = () => {
    setIsAuthenticated(false);
    setAuthPage('signin');
  };

  const handleProfileClick = (personId) => {
    setSelectedPersonId(personId);
    setPage('profile');
  };

  const handleBackToHome = () => setPage('home');

  if (!isAuthenticated) {
    return authPage === 'signin' ? (
      <SignInPage onNavigateHome={handleLogin} onSwitchToSignUp={() => setAuthPage('signup')} />
    ) : (
      <SignUpPage onNavigateHome={handleLogin} onSwitchToSignIn={() => setAuthPage('signin')} />
    );
  }

  if (page === 'profile') {
    return (
      <div className="app-layout">
        <Sidebar page={page} setPage={setPage} onLogout={handleLogout} />
        <MemberProfilePage personId={selectedPersonId} onBack={handleBackToHome} />
      </div>
    );
  }

  if (page === 'search') {
    return (
      <div className="app-layout">
        <Sidebar page={page} setPage={setPage} onLogout={handleLogout} />
        <SearchPage />
      </div>
    );
  }

  if (page === 'graph') {
    return (
      <div className="app-layout">
        <Sidebar page={page} setPage={setPage} onLogout={handleLogout} />
        <GraphView />
      </div>
    );
  }

  return (
    <div className="app-layout">
      <Sidebar page={page} setPage={setPage} onLogout={handleLogout} />
      <FamilyDashboard
        onProfileClick={handleProfileClick}
        onSearchClick={() => setPage('search')}
        onGraphClick={() => setPage('graph')}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
